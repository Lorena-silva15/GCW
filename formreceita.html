<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Receita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tela de Loading -->
    <div id="loadingScreen">
        <div class="spinner"></div>
        <p>Enviando receita...</p>
    </div>

    <style>
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #loadingScreen.show {
            visibility: visible;
            opacity: 1;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #26a69a;
            /* cor principal */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #loadingScreen p {
            font-size: 16px;
            color: #00796b;
            font-weight: 500;
        }


        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f7f9fc;
            padding: 40px;
        }

        form {
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.05);
        }

        label {
            font-weight: 500;
            margin-top: 15px;
            display: block;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 10px 15px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: border 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus,
        input[type="file"]:focus {
            border-color: #26a69a;
            box-shadow: 0 0 5px rgba(38, 166, 154, 0.3);
            outline: none;
        }

        /* ===== Lista de ingredientes ===== */
        ul#itemList {
            list-style: none;
            padding-left: 0;
        }

        ul#itemList li {
            background: #e0f7fa;
            color: #00796b;
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            transition: background 0.2s, transform 0.2s;
        }

        ul#itemList li:hover {
            background: #b2ebf2;
            transform: translateY(-2px);
        }

        ul#itemList li button {
            background: transparent;
            border: none;
            color: #d32f2f;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.2s, transform 0.2s;
        }

        ul#itemList li button:hover {
            color: #f44336;
            transform: scale(1.2);
        }
    </style>
</head>

<body>

    <form action="adicionareceita.php" method="post" enctype="multipart/form-data">
        <h2 class="mb-4 text-center">Adicionar Receita</h2>

        <label for="nome">Nome da Receita</label>
        <input type="text" name="nome" id="nome" required>

        <label for="imagem">Imagem da Receita</label>
        <input type="file" name="img" id="imagem" accept="image/*">

        <label for="ingredientes">Ingredientes</label>
        <input type="text" id="dynamicInput" name="ingredientes"
            placeholder="Digite unm ingrediente e pressione Enter para adicona-lo á lista">
        <ul id="itemList"></ul>

        <label for="modoprep">Modo de Preparo</label>
        <input type="text" id="modoprep" name="modoprep" placeholder="Descreva o modo de preparo">

        <button type="submit" class="btn btn-primary mt-3 w-100">Adicionar Receita</button>
    </form>

    <script>
        const input = document.getElementById("dynamicInput");
        const list = document.getElementById("itemList");

        let items = [];

        function renderList() {
            list.innerHTML = "";
            items.forEach((item, index) => {
                const li = document.createElement("li");

                const span = document.createElement("span");
                span.textContent = item;

                const btn = document.createElement("button");
                btn.textContent = "❌";
                btn.addEventListener("click", () => {
                    items.splice(index, 1);
                    renderList();
                });

                li.appendChild(span);
                li.appendChild(btn);
                list.appendChild(li);
            });
        }

        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault(); // evita o submit
                const value = input.value.trim();
                if (value !== "") {
                    items.push(value);
                    input.value = "";
                    renderList();
                }
            }
        });

        const form = document.querySelector("form");
        const loading = document.getElementById("loadingScreen");

        form.addEventListener("submit", function (e) {
            // Mostra o loading
            loading.classList.add("show");
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
